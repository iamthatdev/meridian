app_env: production
log_level: INFO

database:
  url: postgresql://user:password@prod-db:5432/meridian
  pool_size: 10
  max_overflow: 20

models:
  rw_model_id: Qwen/Qwen2.5-7B-Instruct
  math_model_id: microsoft/phi-4
  fallback_model_id: meta-llama/Llama-3.1-8B-Instruct

lora:
  r: 32
  alpha: 64
  dropout: 0.05

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
  gradient_checkpointing: true

training:
  learning_rate: 2e-5
  batch_size: 4
  gradient_accumulation_steps: 16
  num_epochs: 3
  max_seq_length_rw: 4096
  max_seq_length_math: 2048
  warmup_ratio: 0.05

paths:
  data_dir: /root/meridian/data
  training_dir: /root/meridian/data/training
  generated_dir: /root/meridian/data/generated
  validated_dir: /root/meridian/data/validated
  checkpoint_dir: /root/meridian/checkpoints
  log_dir: /root/meridian/logs