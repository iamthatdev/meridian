app_env: local
log_level: INFO

database:
  url: postgresql://meridian_user:password@localhost:5432/meridian
  pool_size: 2
  max_overflow: 5

models:
  rw_model_id: Qwen/Qwen2.5-7B-Instruct
  math_model_id: microsoft/phi-4
  fallback_model_id: meta-llama/Llama-3.1-8B-Instruct

lora:
  r: 16
  alpha: 32
  dropout: 0.05

training:
  learning_rate: 2e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 2
  max_seq_length_rw: 2048
  max_seq_length_math: 1024

paths:
  data_dir: data
  training_dir: data/training
  generated_dir: data/generated
  validated_dir: data/validated
  checkpoint_dir: checkpoints
  log_dir: outputs/logs